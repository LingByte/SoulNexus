<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VoiceServer WebRTC Demo</title>
  <style>
    :root {
      --fg: #e6e6e6; --bg: #0e0f12; --muted: #8b8e95; --accent: #4ea1ff;
      --ok: #57d28b; --err: #ff7676; --warn: #f5c447;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 24px; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--fg); min-height: 100vh;
    }
    h1 { margin: 0 0 4px; font-size: 18px; font-weight: 600; }
    .sub { color: var(--muted); margin-bottom: 20px; font-size: 12px; }
    .card { background: #14161a; border: 1px solid #25282e; border-radius: 8px; padding: 18px; margin-bottom: 14px; }
    label { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 10px; background: #0a0b0e; border: 1px solid #2a2d33; color: var(--fg); border-radius: 4px; font: inherit; }
    button {
      padding: 9px 18px; border-radius: 4px; border: 0; cursor: pointer;
      font: 600 13px inherit; margin-right: 8px; transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-danger { background: #4a1f1f; color: var(--err); border: 1px solid #6a2a2a; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 10px; font-size: 11px; background: #1f2329; color: var(--muted); }
    .badge.live { background: #1a3a25; color: var(--ok); }
    .badge.err { background: #3a1a1a; color: var(--err); }
    pre {
      background: #0a0b0e; padding: 12px; border-radius: 4px; max-height: 300px; overflow: auto;
      font: 12px/1.5 ui-monospace, "SF Mono", Menlo, monospace; color: #cfd1d4; margin: 0;
    }
    .log-line { padding: 2px 0; }
    .log-line.info { color: var(--muted); }
    .log-line.evt  { color: var(--accent); }
    .log-line.ok   { color: var(--ok); }
    .log-line.warn { color: var(--warn); }
    .log-line.err  { color: var(--err); }
    .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .stat { background: #0a0b0e; padding: 8px 10px; border-radius: 4px; }
    .stat .k { color: var(--muted); font-size: 10px; text-transform: uppercase; }
    .stat .v { font: 600 16px ui-monospace, monospace; }
  </style>
</head>
<body>

<h1>VoiceServer WebRTC Demo</h1>
<div class="sub">Browser ↔ AI 1v1 通话测试。需要 -webrtc-http 监听已开启，且 -dialog-ws 指向运行中的 dialog 应用。</div>

<div class="card">
  <label>Offer endpoint</label>
  <input id="endpoint" value="/webrtc/v1/offer" />
  <div class="row" style="margin-top: 12px;">
    <button id="btnStart" class="btn-primary">开始通话</button>
    <button id="btnStop"  class="btn-danger" disabled>挂断</button>
    <span id="status" class="badge">idle</span>
    <span id="callid"  class="badge"></span>
  </div>
</div>

<div class="card">
  <label>实时统计（每 2s 刷新）</label>
  <div class="stats" id="stats"></div>
</div>

<div class="card">
  <label>事件日志</label>
  <pre id="log"></pre>
</div>

<audio id="remote" autoplay></audio>

<script>
'use strict';

const $ = id => document.getElementById(id);
const logEl = $('log');
const statsEl = $('stats');

let pc = null;
let localStream = null;
let callID = null;
let statsTimer = null;

function log(level, msg) {
  const ts = new Date().toISOString().slice(11, 23);
  const div = document.createElement('div');
  div.className = 'log-line ' + level;
  div.textContent = '[' + ts + '] ' + msg;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(text, cls) {
  const el = $('status');
  el.textContent = text;
  el.className = 'badge ' + (cls || '');
}

async function start() {
  const endpoint = $('endpoint').value.trim();
  $('btnStart').disabled = true;
  setStatus('requesting mic…', '');
  log('info', 'requesting microphone');

  // Browsers gate getUserMedia to "secure contexts": https:// or
  // http://localhost. Hitting this page over plain HTTP from a LAN IP
  // (e.g. http://192.168.x.y:7080) leaves navigator.mediaDevices
  // undefined; without this guard the user just sees
  //   "Cannot read properties of undefined (reading 'getUserMedia')"
  // which is unactionable. WebRTC additionally cannot run at all
  // without a secure context (RTCPeerConnection itself is gated on
  // some browsers), so we fail fast here with the workaround list.
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    log('err', '请用 http://localhost:' + (location.port || '80') + location.pathname + ' 打开本页面（浏览器仅在 localhost / https 下放开麦克风）');
    setStatus('use localhost', 'err');
    $('btnStart').disabled = false;
    return;
  }

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        // 16 kHz mono is what VoiceServer's bridge runs at internally;
        // browsers will resample whatever the mic gives us up to 48 kHz
        // Opus on the wire, then VoiceServer downsamples to 16 kHz.
        sampleRate: { ideal: 48000 },
      },
      video: false,
    });
  } catch (err) {
    log('err', 'getUserMedia: ' + (err && err.message ? err.message : String(err)));
    setStatus('mic denied', 'err');
    $('btnStart').disabled = false;
    return;
  }

  pc = new RTCPeerConnection({
    iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }],
    bundlePolicy: 'max-bundle',
    rtcpMuxPolicy: 'require',
  });

  pc.oniceconnectionstatechange = () => log('evt', 'ICE: ' + pc.iceConnectionState);
  pc.onconnectionstatechange    = () => {
    log('evt', 'PC: ' + pc.connectionState);
    if (pc.connectionState === 'connected') setStatus('connected', 'live');
    if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
      setStatus(pc.connectionState, 'err');
      cleanup();
    }
  };
  pc.ontrack = (evt) => {
    log('ok', 'remote track received: ' + evt.track.kind);
    const remote = $('remote');
    remote.srcObject = evt.streams[0];
  };

  // Add local mic track. recvonly track for AI is added by the server side.
  for (const t of localStream.getAudioTracks()) {
    pc.addTrack(t, localStream);
  }

  log('info', 'creating offer');
  const offer = await pc.createOffer({ offerToReceiveAudio: true });
  await pc.setLocalDescription(offer);

  // Wait for ICE gathering complete (matches the server's no-trickle posture).
  await new Promise((resolve) => {
    if (pc.iceGatheringState === 'complete') return resolve();
    const onGather = () => {
      if (pc.iceGatheringState === 'complete') {
        pc.removeEventListener('icegatheringstatechange', onGather);
        resolve();
      }
    };
    pc.addEventListener('icegatheringstatechange', onGather);
    setTimeout(resolve, 4000); // safety net
  });

  log('info', 'POST offer → ' + endpoint);
  setStatus('negotiating', '');

  let resp;
  try {
    resp = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'offer', sdp: pc.localDescription.sdp }),
    });
  } catch (err) {
    log('err', 'fetch offer: ' + err.message);
    cleanup();
    setStatus('error', 'err');
    return;
  }

  if (!resp.ok) {
    log('err', 'offer rejected: ' + resp.status + ' ' + (await resp.text()));
    cleanup();
    setStatus('rejected', 'err');
    return;
  }
  const answer = await resp.json();
  callID = answer.callId || answer.call_id || '';
  $('callid').textContent = callID ? 'call=' + callID : '';

  await pc.setRemoteDescription({ type: 'answer', sdp: answer.sdp });
  log('ok', 'answer applied; waiting for media');

  $('btnStop').disabled = false;
  startStatsTimer();
}

function startStatsTimer() {
  if (statsTimer) clearInterval(statsTimer);
  statsTimer = setInterval(async () => {
    if (!pc) return;
    const stats = await pc.getStats();
    let inb = null, outb = null, rtt = null;
    stats.forEach((r) => {
      if (r.type === 'inbound-rtp'  && r.kind === 'audio') inb = r;
      if (r.type === 'outbound-rtp' && r.kind === 'audio') outb = r;
      if (r.type === 'remote-inbound-rtp' && r.kind === 'audio' && typeof r.roundTripTime === 'number') {
        rtt = Math.round(r.roundTripTime * 1000);
      }
    });
    statsEl.innerHTML = '';
    const cells = [
      ['RTT',          rtt != null ? rtt + ' ms' : '—'],
      ['recv pkts',    inb  ? inb.packetsReceived  : '—'],
      ['recv bytes',   inb  ? formatBytes(inb.bytesReceived) : '—'],
      ['recv lost',    inb  ? (inb.packetsLost || 0) : '—'],
      ['recv jitter',  inb  ? Math.round((inb.jitter || 0) * 1000) + ' ms' : '—'],
      ['send pkts',    outb ? outb.packetsSent     : '—'],
      ['send bytes',   outb ? formatBytes(outb.bytesSent) : '—'],
    ];
    for (const [k, v] of cells) {
      const d = document.createElement('div');
      d.className = 'stat';
      d.innerHTML = '<div class="k">' + k + '</div><div class="v">' + v + '</div>';
      statsEl.appendChild(d);
    }
  }, 2000);
}

function formatBytes(n) {
  if (n == null) return '—';
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(2) + ' MB';
}

function stop() {
  log('info', 'hangup requested');
  cleanup();
  setStatus('hung up', '');
}

function cleanup() {
  if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (pc) {
    try { pc.close(); } catch (_) {}
    pc = null;
  }
  $('btnStart').disabled = false;
  $('btnStop').disabled = true;
}

$('btnStart').onclick = start;
$('btnStop').onclick  = stop;

log('info', 'demo ready. set offer endpoint and click 开始通话.');
</script>
</body>
</html>
