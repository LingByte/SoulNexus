<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VoiceServer xiaozhi Demo</title>
  <style>
    :root {
      --fg: #e6e6e6; --bg: #0e0f12; --muted: #8b8e95; --accent: #4ea1ff;
      --ok: #57d28b; --err: #ff7676; --warn: #f5c447;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 24px; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--fg); min-height: 100vh;
    }
    h1 { margin: 0 0 4px; font-size: 18px; font-weight: 600; }
    .sub { color: var(--muted); margin-bottom: 20px; font-size: 12px; }
    .card { background: #14161a; border: 1px solid #25282e; border-radius: 8px; padding: 18px; margin-bottom: 14px; }
    label { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 10px; background: #0a0b0e; border: 1px solid #2a2d33; color: var(--fg); border-radius: 4px; font: inherit; }
    button {
      padding: 9px 18px; border-radius: 4px; border: 0; cursor: pointer;
      font: 600 13px inherit; margin-right: 8px; transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-danger { background: #4a1f1f; color: var(--err); border: 1px solid #6a2a2a; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 10px; font-size: 11px; background: #1f2329; color: var(--muted); }
    .badge.live { background: #1a3a25; color: var(--ok); }
    .badge.err  { background: #3a1a1a; color: var(--err); }
    .badge.warn { background: #3a2e1a; color: var(--warn); }
    .meter {
      height: 8px; background: #0a0b0e; border-radius: 4px; overflow: hidden;
      margin-top: 6px;
    }
    .meter > div { height: 100%; width: 0; background: var(--accent); transition: width 0.06s; }
    .convo { display: grid; gap: 10px; }
    .bubble {
      padding: 10px 14px; border-radius: 8px; max-width: 80%;
      font-size: 14px; line-height: 1.5;
    }
    .bubble.you { background: #1f3358; color: #d8e6ff; align-self: flex-end; margin-left: auto; }
    .bubble.ai  { background: #1c2a22; color: #d8f0e0; }
    .bubble .who { font-size: 10px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
    pre {
      background: #0a0b0e; padding: 12px; border-radius: 4px; max-height: 240px; overflow: auto;
      font: 12px/1.5 ui-monospace, "SF Mono", Menlo, monospace; color: #cfd1d4; margin: 0;
    }
    .log-line.info { color: var(--muted); }
    .log-line.evt  { color: var(--accent); }
    .log-line.ok   { color: var(--ok); }
    .log-line.warn { color: var(--warn); }
    .log-line.err  { color: var(--err); }
  </style>
</head>
<body>

<h1>VoiceServer xiaozhi Demo</h1>
<div class="sub">浏览器模拟一台 ESP32 设备：getUserMedia 抓 16 kHz PCM → xiaozhi WS → 接收 AI 文本 + 语音并播放。同一份 dialog 后端服务 SIP / xiaozhi / WebRTC 三种通话。</div>

<div class="card">
  <label>xiaozhi WS endpoint</label>
  <input id="endpoint" value="" placeholder="ws://host:7080/xiaozhi/v1/" />
  <div class="row" style="margin-top: 12px;">
    <button id="btnStart" class="btn-primary">开始通话</button>
    <button id="btnSpeak" disabled>开始说话</button>
    <button id="btnEnd"   disabled>结束说话</button>
    <button id="btnStop"  class="btn-danger" disabled>挂断</button>
    <span id="status" class="badge">idle</span>
    <span id="callid" class="badge"></span>
  </div>
  <div class="meter"><div id="meter"></div></div>
</div>

<div class="card">
  <label>对话</label>
  <div class="convo" id="convo"></div>
</div>

<div class="card">
  <label>事件日志</label>
  <pre id="log"></pre>
</div>

<script>
'use strict';

// ─── DOM helpers ────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const logEl   = $('log');
const convoEl = $('convo');

// Default endpoint — same host as the page; protocol auto (ws/wss).
(function defaultEndpoint() {
  const wsScheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
  $('endpoint').value = wsScheme + '//' + location.host + '/xiaozhi/v1/';
})();

function log(level, msg) {
  const ts = new Date().toISOString().slice(11, 23);
  const div = document.createElement('div');
  div.className = 'log-line ' + level;
  div.textContent = '[' + ts + '] ' + msg;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(text, cls) {
  const el = $('status');
  el.textContent = text;
  el.className = 'badge ' + (cls || '');
}

function bubble(who, text) {
  const div = document.createElement('div');
  div.className = 'bubble ' + who;
  div.innerHTML = '<div class="who">' + (who === 'you' ? 'you (ASR)' : 'ai') + '</div>' +
                  document.createElement('span').appendChild(document.createTextNode(text)).parentNode.outerHTML;
  // simpler: textContent for the body
  div.lastChild.remove();
  const body = document.createElement('div');
  body.textContent = text;
  div.appendChild(body);
  convoEl.appendChild(div);
}

// ─── State ──────────────────────────────────────────────────────────────
let ws        = null;
let audioCtx  = null;          // 16 kHz capture context
let micStream = null;
let micSource = null;
let micProc   = null;          // ScriptProcessorNode for capture
let listening = false;         // are we sending PCM to server?
let sessionID = '';
let serverFmt = 'pcm';         // negotiated TTS audio format
let playCtx   = null;          // 16 kHz playback context
let playClock = 0;             // next-buffer schedule time
let pendingTTS = '';           // accumulator: AI text expected before tts:start

// ─── Connect / handshake ────────────────────────────────────────────────
async function start() {
  const url = $('endpoint').value.trim();
  if (!url) { log('err', 'endpoint required'); return; }

  $('btnStart').disabled = true;
  setStatus('requesting mic…', '');
  log('info', 'requesting microphone');

  // Browsers gate getUserMedia to "secure contexts": https:// or
  // http://localhost. Hitting this page over plain HTTP from a LAN IP
  // (e.g. http://192.168.x.y:7080) leaves navigator.mediaDevices
  // undefined, surfacing as the cryptic
  //   "Cannot read properties of undefined (reading 'getUserMedia')"
  // Detect that up-front and explain the three usable workarounds.
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    log('err', '请用 http://localhost:' + (location.port || '80') + location.pathname + ' 打开本页面（浏览器仅在 localhost / https 下放开麦克风）');
    setStatus('use localhost', 'err');
    $('btnStart').disabled = false;
    return;
  }

  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        channelCount: 1,
      },
      video: false,
    });
  } catch (err) {
    log('err', 'getUserMedia: ' + (err && err.message ? err.message : String(err)));
    setStatus('mic denied', 'err');
    $('btnStart').disabled = false;
    return;
  }

  // Capture context locked at 16 kHz so we don't have to resample. All
  // modern browsers (Chromium, Firefox, Safari 14.1+) honour this.
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
  } catch (err) {
    log('err', 'AudioContext 16k unsupported: ' + err.message);
    setStatus('audio unsupported', 'err');
    cleanup();
    return;
  }
  if (audioCtx.sampleRate !== 16000) {
    log('warn', 'AudioContext got ' + audioCtx.sampleRate + ' Hz; ASR may degrade');
  }
  micSource = audioCtx.createMediaStreamSource(micStream);
  // 1024-sample chunks @ 16 kHz = 64 ms per ScriptProcessor callback,
  // close enough to the xiaozhi 60 ms frame size.
  micProc = audioCtx.createScriptProcessor(1024, 1, 1);
  micProc.onaudioprocess = onMicChunk;
  micSource.connect(micProc);
  micProc.connect(audioCtx.destination); // chrome requires this to fire callbacks

  // Open WS.
  setStatus('connecting…', '');
  log('info', 'WS dial ' + url);
  try {
    ws = new WebSocket(url);
    ws.binaryType = 'arraybuffer';
  } catch (err) {
    log('err', 'WebSocket: ' + err.message);
    cleanup(); setStatus('error', 'err'); return;
  }

  ws.onopen = () => {
    log('ok', 'WS open; → hello');
    sendJSON({
      type: 'hello',
      version: 1,
      transport: 'websocket',
      audio_params: {
        format: 'pcm', sample_rate: 16000, channels: 1,
        frame_duration: 60, bit_depth: 16,
      },
    });
  };
  ws.onclose = (ev) => {
    log('info', 'WS close: ' + ev.code + ' ' + ev.reason);
    setStatus('closed', '');
    cleanup();
  };
  ws.onerror = (ev) => log('err', 'WS error');
  ws.onmessage = onWSMessage;
}

function onWSMessage(ev) {
  if (typeof ev.data === 'string') {
    let msg; try { msg = JSON.parse(ev.data); } catch (e) { log('warn', 'bad json: ' + ev.data); return; }
    switch (msg.type) {
      case 'hello':
        sessionID = msg.session_id || '';
        if (msg.audio_params && msg.audio_params.format) serverFmt = msg.audio_params.format;
        $('callid').textContent = sessionID ? 'session=' + sessionID.slice(0, 12) : '';
        log('ok', 'server hello (fmt=' + serverFmt + ')');
        setStatus('ready', 'live');
        $('btnSpeak').disabled = false;
        $('btnStop').disabled  = false;
        break;
      case 'stt':
        if (msg.text) {
          log('evt', 'stt: ' + msg.text);
          bubble('you', msg.text);
        }
        break;
      case 'tts':
        if (msg.state === 'start') {
          if (msg.text) {
            log('evt', 'tts:start text=' + JSON.stringify(msg.text));
            bubble('ai', msg.text);
          } else {
            log('evt', 'tts:start');
          }
          startPlayback();
        } else if (msg.state === 'stop') {
          log('evt', 'tts:stop');
        } else {
          log('evt', 'tts:' + msg.state);
        }
        break;
      default:
        log('info', '← ' + ev.data);
    }
    return;
  }
  // Binary: AI PCM frame.
  if (serverFmt !== 'pcm') {
    log('warn', 'server sent non-pcm (' + serverFmt + '); demo only decodes pcm');
    return;
  }
  enqueuePCM(new Int16Array(ev.data));
}

// ─── Mic → server ───────────────────────────────────────────────────────
function onMicChunk(ev) {
  const f32 = ev.inputBuffer.getChannelData(0);

  // Live volume meter (RMS over the chunk).
  let sum = 0;
  for (let i = 0; i < f32.length; i++) sum += f32[i] * f32[i];
  const rms = Math.sqrt(sum / f32.length);
  $('meter').style.width = Math.min(100, rms * 400) + '%';

  if (!listening || !ws || ws.readyState !== WebSocket.OPEN) return;

  // Float32 [-1,1] → Int16 LE
  const i16 = new Int16Array(f32.length);
  for (let i = 0; i < f32.length; i++) {
    let s = Math.max(-1, Math.min(1, f32[i]));
    i16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }
  ws.send(i16.buffer);
}

function startSpeak() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  sendJSON({ type: 'listen', state: 'start', mode: 'manual' });
  listening = true;
  log('evt', '→ listen:start');
  $('btnSpeak').disabled = true;
  $('btnEnd').disabled   = false;
  setStatus('listening', 'live');
}

function endSpeak() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  listening = false;
  sendJSON({ type: 'listen', state: 'stop' });
  log('evt', '→ listen:stop');
  $('btnSpeak').disabled = false;
  $('btnEnd').disabled   = true;
  setStatus('waiting AI…', 'warn');
}

// ─── Server PCM → speaker ───────────────────────────────────────────────
function startPlayback() {
  if (!playCtx) {
    try { playCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 }); }
    catch (e) { log('err', 'playback ctx: ' + e.message); return; }
  }
  // Reset clock to "now + small lead" each new tts span.
  playClock = Math.max(playCtx.currentTime + 0.05, playClock);
}

function enqueuePCM(i16) {
  if (!playCtx) startPlayback();
  const f32 = new Float32Array(i16.length);
  for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 0x8000;
  const buf = playCtx.createBuffer(1, f32.length, 16000);
  buf.copyToChannel(f32, 0);
  const src = playCtx.createBufferSource();
  src.buffer = buf;
  src.connect(playCtx.destination);
  const startAt = Math.max(playClock, playCtx.currentTime + 0.01);
  src.start(startAt);
  playClock = startAt + buf.duration;
}

// ─── Cleanup / hangup ───────────────────────────────────────────────────
function stop() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    sendJSON({ type: 'goodbye' });
    try { ws.close(); } catch (_) {}
  }
  cleanup();
  setStatus('hung up', '');
}

function cleanup() {
  listening = false;
  $('btnStart').disabled = false;
  $('btnSpeak').disabled = true;
  $('btnEnd').disabled   = true;
  $('btnStop').disabled  = true;
  $('meter').style.width = '0%';
  if (micProc)   { try { micProc.disconnect();   } catch (_) {} micProc = null; }
  if (micSource) { try { micSource.disconnect(); } catch (_) {} micSource = null; }
  if (audioCtx)  { try { audioCtx.close();       } catch (_) {} audioCtx = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  ws = null;
}

function sendJSON(v) { ws.send(JSON.stringify(v)); }

$('btnStart').onclick = start;
$('btnSpeak').onclick = startSpeak;
$('btnEnd').onclick   = endSpeak;
$('btnStop').onclick  = stop;

log('info', 'demo ready. set endpoint and click 开始通话.');
</script>
</body>
</html>
