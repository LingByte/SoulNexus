apiVersion: v1
kind: Secret
metadata:
  name: {{ include "soulnexus.fullname" . }}-secrets
type: Opaque
stringData:
  sessionSecret: {{ required "secrets.sessionSecret is required" .Values.secrets.sessionSecret | quote }}
  platformAdminPassword: {{ required "secrets.platformAdminPassword is required" .Values.secrets.platformAdminPassword | quote }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "soulnexus.fullname" . }}-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
