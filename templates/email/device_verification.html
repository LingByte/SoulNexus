<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>SoulNexus</title>
<style type="text/css">
body { margin: 0 !important; padding: 0 !important; width: 100% !important; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
table { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
@media only screen and (max-width: 480px) {
  .email-wrapper { padding: 16px 10px !important; }
  .email-container { width: 100% !important; max-width: 100% !important; }
  .email-body { padding: 24px 18px 8px !important; }
  .email-header { padding: 20px 18px !important; }
  .email-footer { padding: 16px 18px 22px !important; }
  .code-box { font-size: 26px !important; letter-spacing: 4px !important; padding: 16px !important; }
}
</style>
</head>
<body style="margin:0;padding:0;background:#f4f6fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
<table class="email-wrapper" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6fb;padding:40px 16px;">
<tr><td align="center">
<table class="email-container" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(22,113,238,0.10);">
<tr><td class="email-header" style="background:linear-gradient(135deg,#1671EE 0%,#1259c7 100%);padding:28px 32px;">
<span style="color:#ffffff;font-size:22px;font-weight:700;letter-spacing:0.02em;">SoulNexus</span>
</td></tr>
<tr><td class="email-body" style="padding:32px 32px 8px;color:#0f172a;font-size:15px;line-height:1.7;">
<h2 style="margin:0 0 12px;font-size:20px;font-weight:600;color:#0f172a;">新设备登录验证</h2>
<p style="margin:0 0 8px;color:#475569;">{{.Username}}，您好！我们检测到您的账号正在新设备上登录。</p>
<p style="margin:0 0 16px;color:#475569;">请输入以下验证码以确认设备可信：</p>
<div class="code-box" style="text-align:center;margin:24px 0;padding:20px;background:#eff6ff;border:1px dashed #1671EE;border-radius:12px;font-size:32px;font-weight:700;letter-spacing:8px;color:#1671EE;">{{.Code}}</div>
<p style="margin:0;color:#64748b;font-size:13px;">设备标识：{{.DeviceID}}</p>
</td></tr>
<tr><td class="email-footer" style="padding:20px 32px 28px;background:#f8fafc;border-top:1px solid #eef2f7;color:#64748b;font-size:12px;line-height:1.6;">
© SoulNexus · 此邮件由系统自动发送，请勿直接回复
</td></tr>
</table>
</td></tr>
</table>
</body>
</html>
