<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>SoulNexus</title>
<style type="text/css">
body { margin: 0 !important; padding: 0 !important; width: 100% !important; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
table { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
@media only screen and (max-width: 480px) {
  .email-wrapper { padding: 16px 10px !important; }
  .email-container { width: 100% !important; max-width: 100% !important; }
  .email-body { padding: 24px 18px 8px !important; }
  .email-header { padding: 20px 18px !important; }
  .email-footer { padding: 16px 18px 22px !important; }
  table.responsive-kv,
  table.responsive-kv tbody,
  table.responsive-kv tr,
  table.responsive-kv td {
    display: block !important;
    width: 100% !important;
    max-width: 100% !important;
    box-sizing: border-box !important;
  }
  table.responsive-kv tr { border-bottom: 1px solid #eef2f7 !important; }
  table.responsive-kv td { text-align: left !important; border: none !important; }
  table.responsive-kv td.col-label {
    color: #64748b !important;
    font-size: 12px !important;
    padding: 10px 16px 2px !important;
    width: 100% !important;
  }
  table.responsive-kv td.col-value {
    color: #0f172a !important;
    font-size: 13px !important;
    font-weight: 600 !important;
    padding: 0 16px 10px !important;
    width: 100% !important;
  }
}
</style>
</head>
<body style="margin:0;padding:0;background:#f4f6fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
<table class="email-wrapper" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6fb;padding:40px 16px;">
<tr><td align="center">
<table class="email-container" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(22,113,238,0.10);">
<tr><td class="email-header" style="background:linear-gradient(135deg,#1671EE 0%,#1259c7 100%);padding:28px 32px;">
<span style="color:#ffffff;font-size:22px;font-weight:700;letter-spacing:0.02em;">SoulNexus</span>
</td></tr>
<tr><td class="email-body" style="padding:32px 32px 8px;color:#0f172a;font-size:15px;line-height:1.7;">
<h2 style="margin:0 0 12px;font-size:20px;font-weight:600;color:#0f172a;">{{if .IsSuspicious}}可疑登录提醒{{else}}新设备登录提醒{{end}}</h2>
<p style="margin:0 0 16px;color:#475569;">{{.Username}}，您的账号刚刚在新设备上登录。</p>
<table class="responsive-kv" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 20px;background:#f8fafc;border-radius:10px;">
<tr>
  <td class="col-label" style="padding:10px 16px;color:#64748b;font-size:13px;width:30%;">时间</td>
  <td class="col-value" style="padding:10px 16px;color:#0f172a;font-size:13px;text-align:right;">{{.LoginTime}}</td>
</tr>
<tr>
  <td class="col-label" style="padding:10px 16px;color:#64748b;font-size:13px;width:30%;">IP</td>
  <td class="col-value" style="padding:10px 16px;color:#0f172a;font-size:13px;text-align:right;word-break:break-all;">{{.IPAddress}}</td>
</tr>
<tr>
  <td class="col-label" style="padding:10px 16px;color:#64748b;font-size:13px;width:30%;">设备</td>
  <td class="col-value" style="padding:10px 16px;color:#0f172a;font-size:13px;text-align:right;">{{.DeviceType}} · {{.OS}} · {{.Browser}}</td>
</tr>
</table>
<p style="margin:0;color:#64748b;font-size:13px;">如非本人操作，请立即修改密码并在设备管理中撤销可疑设备。</p>
</td></tr>
<tr><td class="email-footer" style="padding:20px 32px 28px;background:#f8fafc;border-top:1px solid #eef2f7;color:#64748b;font-size:12px;line-height:1.6;">
© SoulNexus · 此邮件由系统自动发送，请勿直接回复
</td></tr>
</table>
</td></tr>
</table>
</body>
</html>
