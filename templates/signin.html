  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --text: #2a2240;
      --muted: #6f6591;
      --primary: #4f47e6;
      --primary-hover: #4239d4;
      --primary-soft: rgba(79, 71, 230, 0.1);
      --border: #e0d4f7;
      --danger: #d92d20;
      --success: #0a7f48;
      --info: #4f47e6;
      --shadow: 0 20px 48px rgba(79, 71, 230, 0.08);
      --radius: 14px;
      --duration: 280ms;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      padding: 0;
    }
    .header {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }
    .header-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .header-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all var(--duration) ease;
    }
    .header-link:hover {
      color: var(--primary);
      background: var(--primary-soft);
    }
    .main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .shell {
      width: 100%;
      max-width: 980px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
    }
    .left {
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    .left h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      color: #2a2240;
      font-weight: 600;
      text-align: center;
    }
    .wx-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .wx-qr {
      width: 240px;
      height: 240px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #fff;
      position: relative;
      overflow: hidden;
      transition: transform var(--duration) ease, box-shadow var(--duration) ease;
      cursor: pointer;
    }
    .wx-qr img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .wx-qr:hover {
      transform: scale(1.01);
      box-shadow: 0 8px 20px rgba(79, 71, 230, 0.12);
    }
    .wx-tips {
      margin-top: 12px;
      text-align: center;
      color: var(--primary);
      font-size: 14px;
      line-height: 1.8;
      font-weight: 500;
    }
    .right {
      padding: 24px 22px 20px;
      display: grid;
      align-content: start;
      gap: 14px;
      position: relative;
    }
    .top-links {
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
    }
    .top-links a {
      color: var(--primary);
      text-decoration: none;
      transition: color var(--duration) ease;
    }
    .top-links a:hover { color: var(--primary-hover); }
    .switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 5px;
      background: #faf9ff;
    }
    .switch button {
      border: none;
      height: 38px;
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--duration) ease;
    }
    .switch button.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px var(--primary-soft);
      transform: translateY(-1px);
    }
    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px;
      background: #fff;
      display: grid;
      gap: 10px;
      transition: opacity var(--duration) ease, transform var(--duration) ease, visibility var(--duration) ease;
    }
    .panel.faded {
      opacity: 0;
      transform: translateY(-4px);
      visibility: hidden;
      pointer-events: none;
    }
    .panel-title {
      margin: 0;
      font-size: 18px;
      color: #32275a;
    }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); }
    .input {
      width: 100%;
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      outline: none;
      transition: border-color var(--duration) ease, box-shadow var(--duration) ease;
    }
    .input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }
    .captcha-row {
      display: grid;
      grid-template-columns: 1fr 126px;
      gap: 10px;
      align-items: center;
    }
    .captcha {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fbfaff;
      height: 42px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--duration) ease, box-shadow var(--duration) ease;
    }
    .captcha:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(79, 71, 230, 0.1);
    }
    .captcha img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .actions { display: flex; gap: 10px; align-items: center; }
    .btn {
      border: none;
      border-radius: 10px;
      height: 42px;
      padding: 0 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--duration) ease;
    }
    .btn.primary {
      flex: 1;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #6b5ce6);
      box-shadow: 0 6px 18px var(--primary-soft);
    }
    .btn.primary:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, var(--primary-hover), #5a4ad4);
    }
    .btn.secondary {
      background: #f5f3ff;
      color: var(--primary);
      border: 1px solid var(--border);
    }
    .btn.secondary:hover { background: #ebe9ff; }
    .btn.github {
      width: 44px;
      height: 44px;
      padding: 0;
      background: transparent;
      color: #24292f;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 11px;
      transition: transform 0.2s ease, color 0.2s ease;
    }
    .btn.github:hover {
      background: transparent;
      color: #1b1f24;
      transform: scale(1.1);
    }
    .github-icon {
      flex-shrink: 0;
    }
    .divider {
      display: flex;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-text {
      padding: 0 12px;
      font-weight: 500;
    }
    .social-login {
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .btn:disabled { opacity: 0.68; cursor: not-allowed; transform: none; }
    .helper {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }
    .helper a {
      color: var(--primary);
      text-decoration: none;
      transition: color var(--duration) ease;
    }
    .helper a:hover { color: var(--primary-hover); }
    .message {
      min-height: 18px;
      font-size: 13px;
      transition: all var(--duration) ease;
    }
    .message.error { color: var(--danger); }
    .message.success { color: var(--success); }
    .message.info { color: var(--info); }
    .hidden { display: none !important; }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(42, 34, 64, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--duration) ease, visibility var(--duration) ease;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      transform: scale(0.95);
      transition: transform var(--duration) ease;
    }
    .modal.click-mode {
      max-width: 520px;
    }
    .modal-captcha-layout {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }
    .modal-captcha-layout .input {
      height: 44px;
    }
    .modal-captcha-box {
      height: 180px !important;
      border-radius: 12px !important;
    }
    .modal.click-mode .modal-captcha-box {
      height: 260px !important;
    }
    .modal-overlay.active .modal {
      transform: scale(1);
    }
    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 16px 0;
    }
    .verify-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #faf8ff;
      display: grid;
      gap: 10px;
      animation: slideIn var(--duration) ease;
    }
    .forgot-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 44px);
      max-width: 400px;
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #faf8ff;
      display: grid;
      gap: 10px;
    }
    .forgot-box h3 {
      margin: 0;
      font-size: 18px;
      color: #38296c;
    }
    .forgot-box p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }
    .footer {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-6px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 920px) {
      .shell { grid-template-columns: 1fr; }
      .left { display: flex; flex-direction: column; align-items: center; padding: 24px 16px; text-align: center; }
      .right { padding: 16px 14px; }
      .wx-card { margin-top: 12px; }
      .modal.click-mode { max-width: 94vw; }
      .modal.click-mode .modal-captcha-box { height: 220px !important; }
    }
  </style>
</head>

  <script>
    (function () {
      const state = { mode: 'password', captchaId: '', captchaType: 'image', captchaCount: 0, captchaWords: [], captchaPoints: [], pendingDeviceId: '', wechatSessionId: '', wechatPolling: null };
      const rawNext = document.body.dataset.next || '';
      const oidcClientID = (document.body.dataset.oidcClientId || '').trim();
      const oidcRedirectURI = (document.body.dataset.oidcRedirectUri || '').trim();
      const oidcState = (document.body.dataset.oidcState || '').trim();
      const currentParams = new URLSearchParams(window.location.search);
      const normalizeRedirectTarget = (raw) => {
        if (!raw) return 'https://lingecho.com';
        const lowered = raw.toLowerCase();
        if (lowered.indexOf('/api/admin') !== -1) return 'https://lingecho.com';
        if (lowered.indexOf('/api/auth/login') !== -1) return 'https://lingecho.com';
        if (lowered.indexOf('localhost:7073/api/admin') !== -1) return 'https://lingecho.com';
        return raw;
      };
      const redirectTarget = normalizeRedirectTarget(rawNext);
      const buildOIDCRedirect = () => {
        if (!oidcClientID || !oidcRedirectURI) return '';
        const params = new URLSearchParams({
          client_id: oidcClientID,
          redirect_uri: oidcRedirectURI,
        });
        if (oidcState) {
          params.set('state', oidcState);
        }
        return '/api/auth/oidc/authorize?' + params.toString();
      };
      const buildGitHubLoginURL = () => {
        const params = new URLSearchParams();
        if (rawNext) {
          params.set('redirecturl', rawNext);
        }
        if (oidcClientID) {
          params.set('client_id', oidcClientID);
        }
        if (oidcRedirectURI) {
          params.set('redirect_uri', oidcRedirectURI);
        }
        if (oidcState) {
          params.set('state', oidcState);
        }
        const query = params.toString();
        return '/api/auth/github/login' + (query ? ('?' + query) : '');
      };

      const $ = (id) => document.getElementById(id);
      const setMessage = (id, text, type) => {
        const el = $(id);
        el.textContent = text || '';
        el.className = 'message' + (type ? ' ' + type : '');
      };
      const setBtnLoading = (id, loading, idleText, loadingText) => {
        const btn = $(id);
        btn.disabled = !!loading;
        btn.textContent = loading ? loadingText : idleText;
      };
      const openDeviceVerifyModal = () => {
        $('device-code').value = '';
        setMessage('device-verify-message', '', '');
        $('device-verify-modal').classList.add('active');
      };
      const closeDeviceVerifyModal = () => {
        $('device-verify-modal').classList.remove('active');
      };
      const setMode = (mode) => {
        state.mode = mode;
        $('mode-password').classList.toggle('active', mode === 'password');
        $('mode-email').classList.toggle('active', mode === 'email');
        $('password-field').classList.toggle('hidden', mode !== 'password');
        $('emailcode-field').classList.toggle('hidden', mode !== 'email');
      };

      const apiRequest = async (url, payload) => {
        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload || {}),
        });
        let data = {};
        try { data = await resp.json(); } catch (_) {}
        return { resp, data };
      };

      const resetCaptchaModalUI = () => {
        state.captchaPoints = [];
        const modal = document.querySelector('#captcha-modal .modal');
        if (modal) modal.classList.remove('click-mode');
        $('modal-captcha-code').value = '';
        $('modal-captcha-code').style.display = 'block';
        $('modal-captcha-code').placeholder = '请输入图形验证码';
        renderCaptchaPoints();
        const titleEl = document.querySelector('#captcha-modal .modal-title');
        if (titleEl) titleEl.textContent = '请输入图形验证码';
      };
      const renderCaptchaPoints = () => {
        const box = $('modal-captcha-box');
        const img = $('modal-captcha-image');
        if (!box) return;
        box.querySelectorAll('.captcha-point').forEach((el) => el.remove());
        const rect = img ? img.getBoundingClientRect() : null;
        const displayW = rect && rect.width ? rect.width : 1;
        const displayH = rect && rect.height ? rect.height : 1;
        const naturalW = img && img.naturalWidth ? img.naturalWidth : displayW;
        const naturalH = img && img.naturalHeight ? img.naturalHeight : displayH;
        const containScale = Math.min(displayW / (naturalW || 1), displayH / (naturalH || 1));
        const renderedW = (naturalW || 1) * containScale;
        const renderedH = (naturalH || 1) * containScale;
        const padX = (displayW - renderedW) / 2;
        const padY = (displayH - renderedH) / 2;
        state.captchaPoints.forEach((p, idx) => {
          const dot = document.createElement('div');
          dot.className = 'captcha-point';
          dot.textContent = String(idx + 1);
          dot.style.position = 'absolute';
          dot.style.left = `${Math.round(p.x * containScale + padX)}px`;
          dot.style.top = `${Math.round(p.y * containScale + padY)}px`;
          dot.style.transform = 'translate(-50%, -50%)';
          dot.style.width = '18px';
          dot.style.height = '18px';
          dot.style.borderRadius = '999px';
          dot.style.background = 'rgba(79, 71, 230, 0.92)';
          dot.style.color = '#fff';
          dot.style.fontSize = '11px';
          dot.style.fontWeight = '700';
          dot.style.display = 'flex';
          dot.style.alignItems = 'center';
          dot.style.justifyContent = 'center';
          dot.style.pointerEvents = 'none';
          box.appendChild(dot);
        });
      };

      const initWechatMessageLogin = async () => {
        try {
          const resp = await fetch('/api/auth/wechat/login-code');
          const data = await resp.json();
          if (!resp.ok || data.code !== 200 || !data.data) {
            return;
          }
          state.wechatSessionId = data.data.sessionId || '';
          $('wechat-login-code').textContent = data.data.loginCode || '------';
          if (state.wechatPolling) {
            clearInterval(state.wechatPolling);
          }
          state.wechatPolling = setInterval(checkWechatStatus, 2500);
        } catch (_) {}
      };

      const checkWechatStatus = async () => {
        if (!state.wechatSessionId) return;
        try {
          const resp = await fetch('/api/auth/wechat/status?sessionId=' + encodeURIComponent(state.wechatSessionId));
          const data = await resp.json();
          if (!resp.ok || data.code !== 200 || !data.data) return;
          const status = data.data.status;
          if (status === 'scanned') {
            setMessage('login-message', '公众号已收到消息，正在完成登录...', 'info');
            return;
          }
          if (status === 'success' || status === 'authorized') {
            if (state.wechatPolling) {
              clearInterval(state.wechatPolling);
              state.wechatPolling = null;
            }
            const token = data.data.token;
            const refreshToken = data.data.refreshToken;
            if (token) {
              localStorage.setItem('auth_token', token);
            }
            if (refreshToken) {
              localStorage.setItem('refresh_token', refreshToken);
            }
            setMessage('login-message', '微信登录处理中，正在跳转...', 'info');
            setTimeout(() => {
              const oidcURL = buildOIDCRedirect();
              if (oidcURL) {
                window.location.href = oidcURL;
                return;
              }
              window.location.href = data.data.redirect || redirectTarget;
            }, 500);
            return;
          }
          if (status === 'expired') {
            await initWechatMessageLogin();
          }
        } catch (_) {}
      };

      const loadCaptcha = async () => {
        try {
          const resp = await fetch('/api/auth/captcha');
          const data = await resp.json();
          if (!resp.ok || data.code !== 200 || !data.data) {
            throw new Error(data.msg || '获取图形验证码失败');
          }
          resetCaptchaModalUI();
          state.captchaId = data.data.id || '';
          state.captchaType = data.data.type || 'image';
          state.captchaCount = Number(data.data.count || 0);
          state.captchaWords = Array.isArray(data.data.words) ? data.data.words : [];
          $('modal-captcha-image').src = data.data.image || '';
          if (state.captchaType === 'click') {
            const modal = document.querySelector('#captcha-modal .modal');
            if (modal) modal.classList.add('click-mode');
            $('modal-captcha-code').style.display = 'none';
            const titleEl = document.querySelector('#captcha-modal .modal-title');
            if (titleEl) {
              const wordsText = state.captchaWords.length ? state.captchaWords.join('、') : '图中字符';
              titleEl.textContent = '请依次点击图中字符：' + wordsText;
            }
          }
        } catch (err) {
          setMessage('login-message', err.message || '获取图形验证码失败', 'error');
        }
      };

      $('mode-password').addEventListener('click', () => setMode('password'));
      $('mode-email').addEventListener('click', () => setMode('email'));
      $('github-login').addEventListener('click', () => {
        window.location.href = buildGitHubLoginURL();
      });
      $('modal-captcha-box').addEventListener('click', () => {
        if (state.captchaType !== 'click') loadCaptcha();
      });

      let emailCodeCooldown = false;
      $('send-email-code').addEventListener('click', async () => {
        if (emailCodeCooldown) return;
        const email = $('email').value.trim();
        if (!email) {
          setMessage('login-message', '请先输入邮箱地址', 'error');
          return;
        }
        setBtnLoading('send-email-code', true, '发送验证码', '发送中...');
        try {
          const { resp, data } = await apiRequest('/api/auth/send/email', { email: email });
          if (!resp.ok || data.code !== 200) throw new Error(data.msg || '发送邮箱验证码失败');
          setMessage('login-message', '邮箱验证码已发送，请查收', 'success');
          emailCodeCooldown = true;
          let remaining = 180;
          const btn = $('send-email-code');
          const interval = setInterval(() => {
            btn.textContent = remaining + '秒后重发';
            remaining--;
            if (remaining < 0) {
              clearInterval(interval);
              emailCodeCooldown = false;
              btn.textContent = '发送验证码';
            }
          }, 1000);
        } catch (err) {
          setMessage('login-message', err.message || '发送邮箱验证码失败', 'error');
        } finally {
          setBtnLoading('send-email-code', false, '发送验证码', '发送中...');
        }
      });

      $('send-device-code').addEventListener('click', async () => {
        const email = $('email').value.trim();
        if (!email || !state.pendingDeviceId) {
          setMessage('device-verify-message', '缺少设备验证上下文，请重新登录', 'error');
          return;
        }
        setBtnLoading('send-device-code', true, '发送设备验证码', '发送中...');
        try {
          const { resp, data } = await apiRequest('/api/auth/devices/send-verification', {
            email: email,
            deviceId: state.pendingDeviceId,
          });
          if (!resp.ok || data.code !== 200) throw new Error(data.msg || '发送设备验证码失败');
          setMessage('device-verify-message', '设备验证码已发送至邮箱', 'success');
        } catch (err) {
          setMessage('device-verify-message', err.message || '发送设备验证码失败', 'error');
        } finally {
          setBtnLoading('send-device-code', false, '发送设备验证码', '发送中...');
        }
      });

      $('verify-device-code').addEventListener('click', async () => {
        const email = $('email').value.trim();
        const code = $('device-code').value.trim();
        if (!email || !state.pendingDeviceId || !code) {
          setMessage('device-verify-message', '请输入完整设备验证码信息', 'error');
          return;
        }
        setBtnLoading('verify-device-code', true, '验证设备', '验证中...');
        try {
          const { resp, data } = await apiRequest('/api/auth/devices/verify', {
            email: email,
            deviceId: state.pendingDeviceId,
            verifyCode: code,
          });
          if (!resp.ok || data.code !== 200) throw new Error(data.msg || '设备验证失败');
          closeDeviceVerifyModal();
          setMessage('login-message', '设备验证成功，请重新登录', 'success');
          state.pendingDeviceId = '';
        } catch (err) {
          setMessage('device-verify-message', err.message || '设备验证失败', 'error');
        } finally {
          setBtnLoading('verify-device-code', false, '验证设备', '验证中...');
        }
      });

      $('show-forgot').addEventListener('click', () => {
        $('top-links').classList.add('hidden');
        $('switch').classList.add('hidden');
        $('login-form').classList.add('hidden');
        $('forgot-box').classList.remove('hidden');
        document.querySelector('.divider').classList.add('hidden');
        document.querySelector('.social-login').classList.add('hidden');
        $('forgot-message').textContent = '';
        $('forgot-box').style.animation = 'none';
      });
      $('forgot-cancel').addEventListener('click', () => {
        $('top-links').classList.remove('hidden');
        $('switch').classList.remove('hidden');
        $('login-form').classList.remove('hidden');
        $('forgot-box').classList.add('hidden');
        document.querySelector('.divider').classList.remove('hidden');
        document.querySelector('.social-login').classList.remove('hidden');
      });
      $('forgot-submit').addEventListener('click', async () => {
        const email = $('forgot-email').value.trim();
        if (!email) {
          setMessage('forgot-message', '请输入您的邮箱地址', 'error');
          return;
        }
        setBtnLoading('forgot-submit', true, '发送重置链接', '发送中...');
        try {
          const { resp, data } = await apiRequest('/api/auth/reset-password', { email: email });
          if (!resp.ok || data.code !== 200) throw new Error(data.msg || '发送重置链接失败');
          setMessage('forgot-message', '重置密码邮件已发送，请检查您的邮箱', 'success');
        } catch (err) {
          setMessage('forgot-message', err.message || '发送重置链接失败', 'error');
        } finally {
          setBtnLoading('forgot-submit', false, '发送重置链接', '发送中...');
        }
      });

      const performLogin = async (captchaCode, captchaData, skipCaptcha = false) => {
        const payload = {
          email: $('email').value.trim(),
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC',
          twoFactorCode: $('twofactor-code').value.trim(),
        };
        if (!skipCaptcha) {
          payload.captchaId = state.captchaId;
          payload.captchaType = state.captchaType;
          if (state.captchaType === 'click') {
            payload.captchaData = captchaData || '';
          } else {
            payload.captchaCode = captchaCode;
          }
        }
        if (state.mode === 'password') {
          payload.password = $('password').value;
        } else {
          payload.code = $('email-code').value.trim();
        }

        const apiPath = state.mode === 'password' ? '/api/auth/login/password' : '/api/auth/login/email';
        setBtnLoading('login-submit', true, '登录', '登录中...');
        setMessage('login-message', '', '');
        try {
          const { resp, data } = await apiRequest(apiPath, payload);
          if (!resp.ok || data.code !== 200) throw new Error(data.msg || '登录失败');
          const result = data.data || {};

          if (result.requiresTwoFactor) {
            $('twofactor-field').classList.remove('hidden');
            setMessage('login-message', result.message || '请输入两步验证码', 'info');
            setBtnLoading('login-submit', false, '登录', '登录中...');
            return;
          }
          if (result.requiresDeviceVerification) {
            state.pendingDeviceId = result.deviceId || '';
            openDeviceVerifyModal();
            setTimeout(() => { $('send-device-code').click(); }, 0);
            setMessage('login-message', result.message || '当前设备需要验证后才能登录', 'info');
            setBtnLoading('login-submit', false, '登录', '登录中...');
            return;
          }

          const token = result.token || result.authToken || data.token;
          const refreshToken = result.refreshToken || data.refreshToken;
          if (token) localStorage.setItem('auth_token', token);
          if (refreshToken) localStorage.setItem('refresh_token', refreshToken);
          setMessage('login-message', '登录处理中，正在跳转...', 'info');
          setTimeout(() => {
            const oidcURL = buildOIDCRedirect();
            if (oidcURL) {
              window.location.href = oidcURL;
              return;
            }
            window.location.href = redirectTarget;
          }, 650);
        } catch (err) {
          setMessage('login-message', err.message || '登录失败', 'error');
          if (!skipCaptcha) loadCaptcha();
          setBtnLoading('login-submit', false, '登录', '登录中...');
        }
      };

      $('login-submit').addEventListener('click', async () => {
        const twofactorCode = $('twofactor-code').value.trim();
        if (twofactorCode) {
          await performLogin('', '', true);
          return;
        }
        
        const email = $('email').value.trim();
        const password = $('password').value;
        const emailCode = $('email-code').value.trim();
        
        if (!email) {
          setMessage('login-message', '请输入邮箱地址', 'error');
          return;
        }
        if (state.mode === 'password' && !password) {
          setMessage('login-message', '请输入密码', 'error');
          return;
        }
        if (state.mode === 'email' && !emailCode) {
          setMessage('login-message', '请输入邮箱验证码', 'error');
          return;
        }
        
        await loadCaptcha();
        $('modal-captcha-code').value = '';
        $('captcha-modal').classList.add('active');
      });

      $('modal-captcha-confirm').addEventListener('click', async () => {
        let captchaCode = $('modal-captcha-code').value.trim();
        if (state.captchaType === 'click') {
          if (!state.captchaPoints.length || (state.captchaCount > 0 && state.captchaPoints.length !== state.captchaCount)) {
            alert('请按提示完成点击验证码');
            return;
          }
          const captchaData = JSON.stringify(state.captchaPoints);
          $('captcha-modal').classList.remove('active');
          await performLogin('', captchaData);
          return;
        } else if (!captchaCode) {
          alert('请输入图形验证码');
          return;
        }
        $('captcha-modal').classList.remove('active');
        await performLogin(captchaCode, '');
      });
      $('device-verify-modal').addEventListener('click', (event) => {
        if (event.target === $('device-verify-modal')) {
          closeDeviceVerifyModal();
        }
      });

      $('modal-captcha-image').addEventListener('click', (event) => {
        if (state.captchaType !== 'click') return;
        const img = event.target;
        const rect = img.getBoundingClientRect();
        const offsetX = event.clientX - rect.left;
        const offsetY = event.clientY - rect.top;
        const naturalW = img.naturalWidth || rect.width || 1;
        const naturalH = img.naturalHeight || rect.height || 1;
        const containScale = Math.min((rect.width || 1) / naturalW, (rect.height || 1) / naturalH);
        const renderedW = naturalW * containScale;
        const renderedH = naturalH * containScale;
        const padX = ((rect.width || 1) - renderedW) / 2;
        const padY = ((rect.height || 1) - renderedH) / 2;
        const imgX = offsetX - padX;
        const imgY = offsetY - padY;
        if (imgX < 0 || imgY < 0 || imgX > renderedW || imgY > renderedH) return;
        const x = Math.round(imgX / containScale);
        const y = Math.round(imgY / containScale);
        if (state.captchaCount > 0 && state.captchaPoints.length >= state.captchaCount) return;
        state.captchaPoints.push({ x, y });
        renderCaptchaPoints();
      });

      if (currentParams.get('github') === 'ok') {
        const token = currentParams.get('token');
        const refreshToken = currentParams.get('refreshToken');
        if (token) {
          localStorage.setItem('auth_token', token);
        }
        if (refreshToken) {
          localStorage.setItem('refresh_token', refreshToken);
        }
        setMessage('login-message', 'GitHub 登录成功，正在跳转...', 'success');
        setTimeout(() => {
          const oidcURL = buildOIDCRedirect();
          if (oidcURL) {
            window.location.href = oidcURL;
            return;
          }
          window.location.href = redirectTarget;
        }, 550);
        return;
      }
      if (currentParams.get('github') === 'failed') {
        setMessage('login-message', 'GitHub 登录失败，请重试', 'error');
      }

      loadCaptcha();
      initWechatMessageLogin();
    })();
  </script>
</body>
</html>
