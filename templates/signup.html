<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - SoulNexus</title>
  <style>
    :root {
      --bg: #f6f5ff;
      --surface: #ffffff;
      --surface-soft: #faf8ff;
      --text: #2b2342;
      --muted: #766c97;
      --primary: #5e3dc4;
      --primary-hover: #5033a5;
      --primary-soft: rgba(94, 61, 196, 0.14);
      --border: #dfd8fb;
      --success: #087443;
      --danger: #d92d20;
      --duration: 220ms;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 520px at 0% -10%, rgba(116, 87, 216, 0.14), transparent 55%),
        radial-gradient(760px 460px at 100% -15%, rgba(158, 127, 245, 0.11), transparent 58%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 20px 14px;
    }
    .card {
      width: 100%;
      max-width: 620px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 24px 56px rgba(75, 52, 143, 0.13);
      padding: 26px 22px 18px;
      display: grid;
      gap: 14px;
    }
    .head h1 {
      margin: 0;
      font-size: 30px;
      color: #362960;
    }
    .head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }
    .form { display: grid; gap: 12px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); }
    .input {
      width: 100%;
      height: 44px;
      border-radius: 11px;
      border: 1px solid var(--border);
      padding: 0 13px;
      outline: none;
      background: #fff;
      color: var(--text);
      transition: border-color var(--duration) ease, box-shadow var(--duration) ease;
    }
    .input:focus {
      border-color: #7a5bdd;
      box-shadow: 0 0 0 3px var(--primary-soft);
    }
    .inline { display: flex; gap: 10px; }
    .inline .input { flex: 1; }
    .captcha-row { display: grid; grid-template-columns: 1fr 140px; gap: 12px; align-items: center; }
    .captcha {
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: var(--surface-soft);
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--duration) ease, box-shadow var(--duration) ease;
    }
    .captcha:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(98, 65, 196, 0.15);
    }
    .captcha img { width: 100%; height: 100%; object-fit: contain; }
    .btn {
      border: none;
      border-radius: 11px;
      height: 44px;
      padding: 0 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--duration) ease;
      white-space: nowrap;
    }
    .btn.primary {
      width: 100%;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #7a4eff);
      box-shadow: 0 12px 24px var(--primary-soft);
    }
    .btn.primary:hover { background: linear-gradient(135deg, var(--primary-hover), #6a42e0); }
    .btn.secondary {
      background: #eee9ff;
      color: #4f359b;
      border: 1px solid #d7cdfb;
    }
    .btn.secondary:hover { background: #e4dcff; }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }
    .meta a { color: var(--primary); text-decoration: none; }
    .message { min-height: 18px; font-size: 13px; }
    .message.success { color: var(--success); }
    .message.error { color: var(--danger); }
    @media (max-width: 760px) {
      .card { padding: 18px 14px 14px; }
      .row { grid-template-columns: 1fr; }
      .captcha-row { grid-template-columns: 1fr 120px; }
    }
  </style>
</head>
<body data-next="{{ .LoginNext }}">
  <div class="card">
    <div class="head">
      <h1>创建账号</h1>
      <p>填写账号信息并完成邮箱验证，即可开始使用 SoulNexus。</p>
    </div>
    <form id="signup-form" class="form" autocomplete="on">
      <div class="row">
        <div class="field">
          <label for="username">用户名</label>
          <input id="username" class="input" type="text" required placeholder="请输入用户名" />
        </div>
        <div class="field">
          <label for="displayName">显示名称</label>
          <input id="displayName" class="input" type="text" required placeholder="请输入显示名称" />
        </div>
      </div>
      <div class="field">
        <label for="email">邮箱</label>
        <input id="email" class="input" type="email" required placeholder="请输入邮箱地址" />
      </div>
      <div class="row">
        <div class="field">
          <label for="password">密码</label>
          <input id="password" class="input" type="password" required placeholder="请输入密码" />
        </div>
        <div class="field">
          <label for="confirmPassword">确认密码</label>
          <input id="confirmPassword" class="input" type="password" required placeholder="请再次输入密码" />
        </div>
      </div>
      <div class="field">
        <label for="emailCode">邮箱验证码</label>
        <div class="inline">
          <input id="emailCode" class="input" type="text" required placeholder="请输入邮箱验证码" />
          <button id="sendCodeBtn" class="btn secondary" type="button">发送验证码</button>
        </div>
      </div>
      <div class="field">
        <label for="captchaCode">图形验证码</label>
        <div class="captcha-row">
          <input id="captchaCode" class="input" type="text" required placeholder="请输入图形验证码" />
          <div id="captchaBox" class="captcha" title="点击刷新验证码">
            <img id="captchaImage" alt="captcha" />
          </div>
        </div>
      </div>
      <button id="submitBtn" class="btn primary" type="submit">立即注册</button>
      <div id="message" class="message"></div>
    </form>
    <div class="meta">
      <span>已有账号？</span>
      <a id="backLogin" href="/api/auth/login">返回登录</a>
    </div>
  </div>
  <script>
    (function () {
      const state = { captchaId: '' };
      const nextTarget = document.body.dataset.next || '';
      const loginURL = '/api/auth/login' + (nextTarget ? ('?next=' + encodeURIComponent(nextTarget)) : '');
      const $ = (id) => document.getElementById(id);
      $('backLogin').href = loginURL;

      const setMessage = (text, type) => {
        const el = $('message');
        el.textContent = text || '';
        el.className = 'message' + (type ? (' ' + type) : '');
      };
      const setBtnLoading = (id, loading, idle, busy) => {
        const btn = $(id);
        btn.disabled = !!loading;
        btn.textContent = loading ? busy : idle;
      };
      const apiRequest = async (url, payload) => {
        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload || {}),
        });
        let data = {};
        try { data = await resp.json(); } catch (_) {}
        return { resp, data };
      };
      const loadCaptcha = async () => {
        try {
          const resp = await fetch('/api/auth/captcha');
          const data = await resp.json();
          if (!resp.ok || data.code !== 200 || !data.data) throw new Error(data.msg || '获取图形验证码失败');
          state.captchaId = data.data.id || '';
          $('captchaImage').src = data.data.image || '';
        } catch (err) {
          setMessage(err.message || '获取图形验证码失败', 'error');
        }
      };
      $('captchaBox').addEventListener('click', loadCaptcha);

      $('sendCodeBtn').addEventListener('click', async () => {
        const email = $('email').value.trim();
        if (!email) return setMessage('请先输入邮箱地址', 'error');
        setBtnLoading('sendCodeBtn', true, '发送验证码', '发送中...');
        try {
          const { resp, data } = await apiRequest('/api/auth/send/email', { email: email });
          if (!resp.ok || data.code !== 200) throw new Error(data.msg || '发送验证码失败');
          setMessage('验证码已发送，请检查邮箱', 'success');
        } catch (err) {
          setMessage(err.message || '发送验证码失败', 'error');
        } finally {
          setBtnLoading('sendCodeBtn', false, '发送验证码', '发送中...');
        }
      });

      $('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = $('password').value;
        const confirmPassword = $('confirmPassword').value;
        if (password !== confirmPassword) return setMessage('两次输入的密码不一致', 'error');
        const payload = {
          userName: $('username').value.trim(),
          displayName: $('displayName').value.trim(),
          email: $('email').value.trim(),
          password: password,
          code: $('emailCode').value.trim(),
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC',
          captchaId: state.captchaId,
          captchaCode: $('captchaCode').value.trim(),
        };
        if (!payload.userName || !payload.displayName || !payload.email || !payload.password || !payload.code || !payload.captchaCode) {
          return setMessage('请完整填写注册信息', 'error');
        }
        setBtnLoading('submitBtn', true, '立即注册', '注册中...');
        setMessage('', '');
        try {
          const { resp, data } = await apiRequest('/api/auth/register/email', payload);
          if (!resp.ok || data.code !== 200) throw new Error(data.msg || '注册失败');
          setMessage('注册成功，正在跳转到登录页...', 'success');
          setTimeout(() => { window.location.href = loginURL; }, 700);
        } catch (err) {
          setMessage(err.message || '注册失败', 'error');
          loadCaptcha();
        } finally {
          setBtnLoading('submitBtn', false, '立即注册', '注册中...');
        }
      });

      loadCaptcha();
    })();
  </script>
</body>
</html>
