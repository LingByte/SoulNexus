  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-soft: #f5f3ff;
      --text: #2a2240;
      --muted: #6f6591;
      --primary: #4f47e6;
      --primary-hover: #4239d4;
      --primary-soft: rgba(79, 71, 230, 0.1);
      --border: #e0d4f7;
      --success: #0a7f48;
      --danger: #d92d20;
      --duration: 280ms;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      padding: 0;
    }
    .header {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }
    .header-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .header-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all var(--duration) ease;
    }
    .header-link:hover {
      color: var(--primary);
      background: var(--primary-soft);
    }
    .main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 20px 14px;
    }
    .card {
      width: 100%;
      max-width: 620px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 24px 56px rgba(79, 71, 230, 0.08);
      padding: 26px 22px 18px;
      display: grid;
      gap: 14px;
    }
    .head h1 {
      margin: 0;
      font-size: 30px;
      color: #2a2240;
      font-weight: 600;
    }
    .head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }
    .form { display: grid; gap: 12px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); }
    .input {
      width: 100%;
      height: 44px;
      border-radius: 11px;
      border: 1px solid var(--border);
      padding: 0 13px;
      outline: none;
      background: #fff;
      color: var(--text);
      transition: border-color var(--duration) ease, box-shadow var(--duration) ease;
    }
    .input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }
    .inline { display: flex; gap: 10px; }
    .inline .input { flex: 1; }
    .captcha-row { display: grid; grid-template-columns: 1fr 140px; gap: 12px; align-items: center; }
    .captcha {
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: var(--surface-soft);
      position: relative;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--duration) ease, box-shadow var(--duration) ease;
    }
    .captcha:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(79, 71, 230, 0.1);
    }
    .captcha img { width: 100%; height: 100%; object-fit: contain; }
    .btn {
      border: none;
      border-radius: 11px;
      height: 44px;
      padding: 0 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--duration) ease;
      white-space: nowrap;
    }
    .btn.primary {
      width: 100%;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #6b5ce6);
      box-shadow: 0 6px 18px var(--primary-soft);
    }
    .btn.primary:hover { background: linear-gradient(135deg, var(--primary-hover), #5a4ad4); }
    .btn.secondary {
      background: #f5f3ff;
      color: var(--primary);
      border: 1px solid var(--border);
    }
    .btn.secondary:hover { background: #ebe9ff; }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }
    .meta a { color: var(--primary); text-decoration: none; }
    .message { min-height: 18px; font-size: 13px; }
    .hidden { display: none !important; }
    .footer {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
    }
    .password-strength {
      font-size: 11px;
      margin-top: 4px;
      min-height: 16px;
    }
    .password-strength.weak { color: var(--danger); }
    .password-strength.medium { color: #f59e0b; }
    .password-strength.strong { color: var(--success); }
    .message.success { color: var(--success); }
    .message.error { color: var(--danger); }
    .modal {
      width: 100%;
      max-width: 420px;
    }
    .modal.click-mode {
      max-width: 520px;
    }
    .modal-captcha-layout {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }
    .modal-captcha-layout .input {
      height: 44px;
    }
    .modal-captcha-box {
      height: 180px !important;
      border-radius: 12px !important;
    }
    .modal.click-mode .modal-captcha-box {
      height: 260px !important;
    }
    @media (max-width: 760px) {
      .card { padding: 18px 14px 14px; }
      .row { grid-template-columns: 1fr; }
      .captcha-row { grid-template-columns: 1fr 120px; }
      .modal.click-mode { max-width: 94vw; }
      .modal.click-mode .modal-captcha-box { height: 220px !important; }
    }
  </style>
</head>

  <div id="captcha-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 class="modal-title">请输入图形验证码</h3>
      <div class="modal-captcha-layout">
        <input id="modalCaptchaCode" class="input" type="text" required placeholder="请输入图形验证码" />
        <div id="modalCaptchaBox" class="captcha modal-captcha-box" title="点击刷新验证码">
          <img id="modalCaptchaImage" alt="captcha" />
        </div>
      </div>
      <div class="actions">
        <button id="modalCaptchaConfirm" class="btn primary" type="button">确认</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const state = { captchaId: '', captchaType: 'image', captchaCount: 0, captchaWords: [], captchaPoints: [] };
      const nextTarget = document.body.dataset.next || '';
      const loginURL = '/api/auth/login' + (nextTarget ? ('?next=' + encodeURIComponent(nextTarget)) : '');
      const $ = (id) => document.getElementById(id);
      $('backLogin').href = loginURL;

      const setMessage = (text, type) => {
        const el = $('message');
        el.textContent = text || '';
        el.className = 'message' + (type ? (' ' + type) : '');
      };
      const setBtnLoading = (id, loading, idle, busy) => {
        const btn = $(id);
        btn.disabled = !!loading;
        btn.textContent = loading ? busy : idle;
      };
      const apiRequest = async (url, payload) => {
        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload || {}),
        });
        let data = {};
        try { data = await resp.json(); } catch (_) {}
        return { resp, data };
      };
      const resetCaptchaModalUI = () => {
        state.captchaPoints = [];
        const modal = document.querySelector('#captcha-modal .modal');
        if (modal) modal.classList.remove('click-mode');
        $('modalCaptchaCode').value = '';
        $('modalCaptchaCode').style.display = 'block';
        $('modalCaptchaCode').placeholder = '请输入图形验证码';
        renderCaptchaPoints();
        const titleEl = document.querySelector('#captcha-modal .modal-title');
        if (titleEl) titleEl.textContent = '请输入图形验证码';
      };
      const renderCaptchaPoints = () => {
        const box = $('modalCaptchaBox');
        const img = $('modalCaptchaImage');
        if (!box) return;
        box.querySelectorAll('.captcha-point').forEach((el) => el.remove());
        const rect = img ? img.getBoundingClientRect() : null;
        const displayW = rect && rect.width ? rect.width : 1;
        const displayH = rect && rect.height ? rect.height : 1;
        const naturalW = img && img.naturalWidth ? img.naturalWidth : displayW;
        const naturalH = img && img.naturalHeight ? img.naturalHeight : displayH;
        const containScale = Math.min(displayW / (naturalW || 1), displayH / (naturalH || 1));
        const renderedW = (naturalW || 1) * containScale;
        const renderedH = (naturalH || 1) * containScale;
        const padX = (displayW - renderedW) / 2;
        const padY = (displayH - renderedH) / 2;
        state.captchaPoints.forEach((p, idx) => {
          const dot = document.createElement('div');
          dot.className = 'captcha-point';
          dot.textContent = String(idx + 1);
          dot.style.position = 'absolute';
          dot.style.left = `${Math.round(p.x * containScale + padX)}px`;
          dot.style.top = `${Math.round(p.y * containScale + padY)}px`;
          dot.style.transform = 'translate(-50%, -50%)';
          dot.style.width = '18px';
          dot.style.height = '18px';
          dot.style.borderRadius = '999px';
          dot.style.background = 'rgba(79, 71, 230, 0.92)';
          dot.style.color = '#fff';
          dot.style.fontSize = '11px';
          dot.style.fontWeight = '700';
          dot.style.display = 'flex';
          dot.style.alignItems = 'center';
          dot.style.justifyContent = 'center';
          dot.style.pointerEvents = 'none';
          box.appendChild(dot);
        });
      };
      const loadCaptcha = async () => {
        try {
          const resp = await fetch('/api/auth/captcha');
          const data = await resp.json();
          if (!resp.ok || data.code !== 200 || !data.data) throw new Error(data.msg || '获取图形验证码失败');
          resetCaptchaModalUI();
          state.captchaId = data.data.id || '';
          state.captchaType = data.data.type || 'image';
          state.captchaCount = Number(data.data.count || 0);
          state.captchaWords = Array.isArray(data.data.words) ? data.data.words : [];
          $('modalCaptchaImage').src = data.data.image || '';
          if (state.captchaType === 'click') {
            const modal = document.querySelector('#captcha-modal .modal');
            if (modal) modal.classList.add('click-mode');
            $('modalCaptchaCode').style.display = 'none';
            const titleEl = document.querySelector('#captcha-modal .modal-title');
            if (titleEl) {
              const wordsText = state.captchaWords.length ? state.captchaWords.join('、') : '图中字符';
              titleEl.textContent = '请依次点击图中字符：' + wordsText;
            }
          }
        } catch (err) {
          setMessage(err.message || '获取图形验证码失败', 'error');
        }
      };
      const checkPasswordStrength = (password) => {
        let score = 0;
        if (password.length < 8) return 0;
        if (password.length >= 8) score++;
        if (password.length >= 12) score++;
        if (/[a-z]/.test(password)) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^a-zA-Z0-9]/.test(password)) score++;
        return score;
      };
      const updatePasswordStrengthIndicator = (password) => {
        const strength = checkPasswordStrength(password);
        const el = $('password-strength');
        el.className = 'password-strength';
        if (!password) {
          el.textContent = '';
          return;
        }
        if (strength === 0) {
          el.textContent = '密码强度：弱（至少需要8位字符）';
          el.classList.add('weak');
        } else if (strength < 3) {
          el.textContent = '密码强度：弱（建议添加大小写字母、数字或特殊字符）';
          el.classList.add('weak');
        } else if (strength < 5) {
          el.textContent = '密码强度：中等';
          el.classList.add('medium');
        } else {
          el.textContent = '密码强度：强';
          el.classList.add('strong');
        }
      };
      $('password').addEventListener('input', (e) => {
        updatePasswordStrengthIndicator(e.target.value);
      });
      $('modalCaptchaBox').addEventListener('click', () => {
        if (state.captchaType !== 'click') loadCaptcha();
      });

      let emailCodeCooldown = false;
      $('sendCodeBtn').addEventListener('click', async () => {
        if (emailCodeCooldown) return;
        const email = $('email').value.trim();
        if (!email) return setMessage('请先输入邮箱地址', 'error');
        setBtnLoading('sendCodeBtn', true, '发送验证码', '发送中...');
        try {
          const { resp, data } = await apiRequest('/api/auth/send/email', { email: email });
          if (!resp.ok || data.code !== 200) throw new Error(data.msg || '发送验证码失败');
          setMessage('验证码已发送，请检查邮箱', 'success');
          emailCodeCooldown = true;
          let remaining = 180;
          const btn = $('sendCodeBtn');
          const interval = setInterval(() => {
            btn.textContent = remaining + '秒后重发';
            remaining--;
            if (remaining < 0) {
              clearInterval(interval);
              emailCodeCooldown = false;
              btn.textContent = '发送验证码';
            }
          }, 1000);
        } catch (err) {
          setMessage(err.message || '发送验证码失败', 'error');
        } finally {
          setBtnLoading('sendCodeBtn', false, '发送验证码', '发送中...');
        }
      });

      const performSignup = async (captchaCode, captchaData) => {
        const password = $('password').value;
        const confirmPassword = $('confirmPassword').value;
        if (password !== confirmPassword) return setMessage('两次输入的密码不一致', 'error');
        const strength = checkPasswordStrength(password);
        if (strength < 3) return setMessage('密码强度不足，请使用至少8位且包含大小写字母、数字或特殊字符的密码', 'error');
        const payload = {
          userName: $('username').value.trim(),
          displayName: $('displayName').value.trim(),
          email: $('email').value.trim(),
          password: password,
          code: $('emailCode').value.trim(),
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC',
          captchaId: state.captchaId,
          captchaType: state.captchaType,
          captchaCode: state.captchaType === 'image' ? (captchaCode || '') : '',
          captchaData: state.captchaType === 'click' ? (captchaData || '') : '',
        };
        if (!payload.userName || !payload.displayName || !payload.email || !payload.password || !payload.code) {
          return setMessage('请完整填写注册信息', 'error');
        }
        setBtnLoading('submitBtn', true, '立即注册', '注册中...');
        setMessage('', '');
        try {
          const { resp, data } = await apiRequest('/api/auth/register/email', payload);
          if (!resp.ok || data.code !== 200) throw new Error(data.msg || '注册失败');
          setMessage('注册成功，正在跳转到登录页...', 'success');
          setTimeout(() => { window.location.href = loginURL; }, 700);
        } catch (err) {
          setMessage(err.message || '注册失败', 'error');
          loadCaptcha();
        } finally {
          setBtnLoading('submitBtn', false, '立即注册', '注册中...');
        }
      };
      $('submitBtn').addEventListener('click', async () => {
        const username = $('username').value.trim();
        const displayName = $('displayName').value.trim();
        const email = $('email').value.trim();
        const password = $('password').value;
        const confirmPassword = $('confirmPassword').value;
        const emailCode = $('emailCode').value.trim();
        
        if (!username) return setMessage('请输入用户名', 'error');
        if (!displayName) return setMessage('请输入显示名称', 'error');
        if (!email) return setMessage('请输入邮箱地址', 'error');
        if (!password) return setMessage('请输入密码', 'error');
        if (!confirmPassword) return setMessage('请确认密码', 'error');
        if (password !== confirmPassword) return setMessage('两次输入的密码不一致', 'error');
        if (!emailCode) return setMessage('请输入邮箱验证码', 'error');
        
        await loadCaptcha();
        $('modalCaptchaCode').value = '';
        $('captcha-modal').classList.add('active');
      });
      $('modalCaptchaConfirm').addEventListener('click', async () => {
        let captchaCode = $('modalCaptchaCode').value.trim();
        if (state.captchaType === 'click') {
          if (!state.captchaPoints.length || (state.captchaCount > 0 && state.captchaPoints.length !== state.captchaCount)) {
            alert('请按提示完成点击验证码');
            return;
          }
          const captchaData = JSON.stringify(state.captchaPoints);
          $('captcha-modal').classList.remove('active');
          await performSignup('', captchaData);
          return;
        } else if (!captchaCode) {
          alert('请输入图形验证码');
          return;
        }
        $('captcha-modal').classList.remove('active');
        await performSignup(captchaCode, '');
      });
      $('modalCaptchaImage').addEventListener('click', (event) => {
        if (state.captchaType !== 'click') return;
        const img = event.target;
        const rect = img.getBoundingClientRect();
        const offsetX = event.clientX - rect.left;
        const offsetY = event.clientY - rect.top;
        const naturalW = img.naturalWidth || rect.width || 1;
        const naturalH = img.naturalHeight || rect.height || 1;
        const containScale = Math.min((rect.width || 1) / naturalW, (rect.height || 1) / naturalH);
        const renderedW = naturalW * containScale;
        const renderedH = naturalH * containScale;
        const padX = ((rect.width || 1) - renderedW) / 2;
        const padY = ((rect.height || 1) - renderedH) / 2;
        const imgX = offsetX - padX;
        const imgY = offsetY - padY;
        if (imgX < 0 || imgY < 0 || imgX > renderedW || imgY > renderedH) return;
        const x = Math.round(imgX / containScale);
        const y = Math.round(imgY / containScale);
        if (state.captchaCount > 0 && state.captchaPoints.length >= state.captchaCount) return;
        state.captchaPoints.push({ x, y });
        renderCaptchaPoints();
      });
    })();
  </script>
</body>
