server:
  # 服务监听地址，0.0.0.0 表示所有网卡
  host: 0.0.0.0
  # 服务监听端口
  port: 8005
  # 接口访问令牌，会随机生成，如果为空，会自动生成
  authorization:

# 与 SoulNexus 共用同一数据库（推荐）
# 也可用环境变量覆盖：DB_DRIVER / DSN（与主项目一致）
database:
  # sqlite | postgres | mysql
  driver: sqlite
  # sqlite 例: ./lingecho.db
  # postgres 例: host=127.0.0.1 user=postgres password=xxx dbname=soulnexus sslmode=disable
  # mysql 例: user:pass@127.0.0.1:3306/soulnexus?charset=utf8mb4
  dsn: ./lingecho.db

# 兼容旧配置：若未设置 database / 环境变量，仍可读 mysql 块
# mysql:
#   host: 127.0.0.1
#   port: 3306
#   user:
#   password:
#   database:

voiceprint:
  similarity_threshold: 0.2
  target_sample_rate: 16000
  tmp_dir: tmp
