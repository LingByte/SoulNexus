<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet Studio Preview</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: linear-gradient(180deg, #1e1b4b 0%, #0f172a 100%); }
    #app { position: absolute; inset: 0; width: 100%; height: 100%; }
    #boot { color: rgba(255,255,255,0.45); font: 12px/1.5 system-ui, sans-serif; text-align: center; padding: 24px; }
    #err { display: none; margin: 12px; padding: 12px; border-radius: 8px; background: rgba(127,29,29,0.9); color: #fecaca; font: 11px/1.45 ui-monospace, monospace; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <div id="boot">等待 Studio 发送预览数据…</div>
  <div id="app"></div>
  <pre id="err"></pre>
  <script>
    const CHANNEL = 'soul-pet-preview'
    let styleEl = null
    window.__PET_PREVIEW_GEN__ = 0

    function showError(msg) {
      document.getElementById('err').style.display = 'block'
      document.getElementById('err').textContent = msg
    }
    function clearError() {
      const err = document.getElementById('err')
      err.style.display = 'none'
      err.textContent = ''
    }

    function guardLegacyPetJs(entry) {
      if (!entry || entry.indexOf('liveDestroyed') >= 0) return entry
      var out = entry.replace(/app\.renderer\.resize\(/g, '(app&&app.renderer)&&app.renderer.resize(')
      if (out.indexOf('drawFrameSheet') < 0 || out.indexOf('drawDt = lastTs') >= 0) return out
      out = out.replace('var lastTs = 0', 'var lastTs = 0\n  var drawDt = 0\n  var lastRenderedAnim = null')
      out = out.replace(
        /function draw\(ts\) \{\s*\n\s*if \(!ctx \|\| destroyed\) return\s*\n\s*lastTs = ts/,
        'function draw(ts) {\n    if (!ctx || destroyed) return\n    drawDt = lastTs ? (ts - lastTs) / 1000 : 0\n    lastTs = ts'
      )
      out = out.replace(
        /var dt = lastTs \? \(performance\.now\(\) - lastTs\) \/ 1000 : 0\s*\n\s*frameAcc \+= dt \* fps/,
        'frameAcc += drawDt * fps'
      )
      if (out.indexOf('lastRenderedAnim = animName') < 0) {
        out = out.replace(
          /var animName = pickAnim\(\)\s*\n\s*var entry = animName/,
          'var animName = pickAnim()\n    if (animName !== lastRenderedAnim) {\n      frameIndex = 0\n      frameAcc = 0\n      lastRenderedAnim = animName\n    }\n    var entry = animName'
        )
      }
      return out
    }

    function teardownPrevPet() {
      try { window.__PET_SPRITE__?.stop?.() } catch (e) {}
      window.__PET_SPRITE__ = null
    }

    function loadVoiceBridge(apiBase) {
      if (window.__SOUL_PET_VOICE__) return
      var base = (apiBase || '').replace(/\/api\/?$/, '')
      var s = document.createElement('script')
      s.src = base + '/api/static/js/pet-voice-bridge.js'
      s.async = true
      document.head.appendChild(s)
    }

    function render(payload) {
      clearError()
      if (!payload || !payload.apiBase) {
        showError('预览缺少 apiBase')
        return
      }
      if (!payload.projectBase) {
        showError('预览缺少 projectBase')
        return
      }

      var gen = ++window.__PET_PREVIEW_GEN__
      document.getElementById('boot').style.display = 'none'
      const app = document.getElementById('app')
      app.innerHTML = ''
      teardownPrevPet()

      if (styleEl) styleEl.remove()
      styleEl = document.createElement('style')
      styleEl.textContent = payload.css || ''
      document.head.appendChild(styleEl)

      try { window.__PET_MANIFEST__ = JSON.parse(payload.manifest || '{}') } catch (e) { window.__PET_MANIFEST__ = {} }
      window.SERVER_BASE = payload.apiBase || ''
      window.ASSISTANT_NAME = 'preview'
      window.__PET_PROJECT_BASE__ = payload.projectBase || ''

      try {
        var entry = guardLegacyPetJs(payload.entry || '')
        if (!entry.trim()) { showError('pet.js 为空'); return }
        new Function(entry)()
        if (gen !== window.__PET_PREVIEW_GEN__) return
        loadVoiceBridge(payload.apiBase)
      } catch (e) {
        showError((e && e.stack) || (e && e.message) || String(e))
      }
    }

    window.addEventListener('message', function (e) {
      if (!e.data || e.data.channel !== CHANNEL) return
      if (e.data.type === 'render' && e.data.payload) render(e.data.payload)
    })

    window.addEventListener('error', function (e) {
      var text = (e.message || '脚本错误') + (e.filename ? '\n' + e.filename + ':' + e.lineno : '')
      showError(text)
      window.parent.postMessage({ channel: CHANNEL, type: 'error', message: text }, '*')
    })

    window.parent.postMessage({ channel: CHANNEL, type: 'ready' }, '*')
  </script>
</body>
</html>
